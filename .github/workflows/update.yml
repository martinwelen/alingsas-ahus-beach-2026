name: Uppdatera schema

# Kör i GitHubs moln – ingen lokal dator behövs.
on:
  schedule:
    - cron: "*/30 * * * *"        # normalt: var 30:e minut (no-op om inget ändrats)
    - cron: "*/10 * 17,18 7 *"    # turneringshelgen 17-18 juli: var 10:e minut
  workflow_dispatch:               # + manuell "Run workflow"-knapp

concurrency:
  group: update-schema
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera beroenden
        run: pip install openpyxl

      - name: Hämta matcher från cupmanager
        run: python fetch_matches.py

      - name: Hämta tabeller & slutspel från cupmanager
        run: python fetch_standings.py

      - name: Avgör om datan ändrats
        id: changed
        run: |
          if git diff --quiet -- matches.json standings.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "matches.json + standings.json oförändrade – hoppar över bygge/commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bygg om kalendrar, Excel och sida
        if: steps.changed.outputs.changed == 'true'
        run: |
          python build_ics.py
          python build_excel.py
          python build_site.py

      - name: Committa och publicera
        if: steps.changed.outputs.changed == 'true'
        run: |
          git config user.name "ahus-schema-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Auto-uppdatering av schema ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          git push
          echo "Ändringar publicerade."
